<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MorphSwift — Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/responsive.css" />
<link rel="stylesheet" href="assets/css/morph-brand.css" />
<link rel="stylesheet" href="assets/css/fit-screen.css" />
<link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0E0E11;
    --surface: #141418;
    --surface-2: #1c1c22;
    --surface-3: #25252e;
    --border: rgba(255,255,255,0.07);
    --border-light: rgba(255,255,255,0.04);
    --amber: #1BE500;
    --amber-dim: rgba(27, 229, 0, 0.12);
    --text: #f0ede8;
    --muted: #5c5b70;
    --muted-2: #2e2e3e;
    --green: #22c55e;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.4px;
  }

  .logo { display: none; }

  .merchant-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .merchant-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--amber-dim);
    border: 1px solid rgba(27, 229, 0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--amber);
    font-weight: 500;
  }

  /* Currency toggle */
  .currency-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    flex-shrink: 0;
  }

  .currency-tab {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .currency-tab.active {
    background: var(--amber-dim);
    border-color: rgba(27, 229, 0,0.3);
    color: var(--amber);
  }

  .rate-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .rate-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Amount display */
  .amount-area {
    flex: 0 0 auto;
    padding: 8px 20px 16px;
    position: relative;
  }

  .amount-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .amount-display {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    min-height: clamp(32px, 7dvh, 48px);
    flex-wrap: nowrap;
    overflow: hidden;
  }

  .amount-currency {
    font-family: var(--display);
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 700;
    color: var(--muted);
    line-height: 1;
    padding-bottom: 4px;
    flex-shrink: 0;
  }

  .amount-value {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(20px, calc((100vw - 96px) / 7), 38px);
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text);
    transition: color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
    flex: 1 1 auto;
    min-width: 0;
  }

  .amount-value.has-value { color: #fff; }

  .cursor-blink {
    width: 3px;
    height: clamp(20px, 6dvh, 44px);
    background: var(--amber);
    border-radius: 2px;
    margin-bottom: 4px;
    animation: cursor 1s ease infinite;
    flex-shrink: 0;
    align-self: flex-end;
  }

  @keyframes cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Conversion display */
  .conversion-card {
    margin: 0 20px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    flex-shrink: 0;
  }

  .conversion-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .conversion-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .conversion-refresh {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stablecoin-row {
    display: flex;
    gap: 8px;
  }

  .stablecoin-chip {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .stablecoin-chip:hover { border-color: var(--border-light); }

  .sc-token {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .sc-amount {
    font-size: clamp(12px, 3vw, 15px);
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sc-network {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Keypad */
  .keypad {
    flex: 1 1 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, minmax(0, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    min-height: 0;
  }

  .key {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    min-height: 0;
    padding: clamp(2px, 0.8vmin, 6px) 0;
  }

  .key:hover { background: var(--surface-2); }
  .key:active { background: var(--surface-3); }

  .key.key-action { background: var(--surface-2); }
  .key.key-action:hover { background: var(--surface-3); }

  .key.key-charge {
    background: var(--amber);
    grid-column: span 2;
    flex-direction: row;
    gap: 10px;
  }

  .key.key-charge:hover { background: #15CC00; }
  .key.key-charge:active { background: #12b800; }

  .key-num {
    font-family: var(--display);
    font-size: clamp(16px, 4.5vmin, 22px);
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .key.key-charge .key-num {
    color: #0a0a0f;
    font-size: clamp(13px, 3.5vmin, 16px);
  }

  .key-sub {
    font-size: clamp(7px, 1.8vmin, 9px);
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
    text-transform: uppercase;
  }

  .key-decimal {
    font-size: clamp(20px, 5vmin, 28px);
    color: var(--muted);
  }

  .key-backspace {
    font-size: clamp(16px, 4vmin, 20px);
    color: var(--muted);
  }

  /* Bottom action bar */
  .bottom-bar {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 12px;
    flex-shrink: 0;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
  }

  .nav-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

  .nav-btn.active {
    color: var(--amber);
    border-color: rgba(27, 229, 0,0.3);
    background: var(--amber-dim);
  }

  /* Ripple on tap */
  @keyframes ripple {
    from { transform: scale(0); opacity: 0.3; }
    to   { transform: scale(3); opacity: 0; }
  }

  .ripple {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--amber);
    pointer-events: none;
    animation: ripple 0.4s ease-out both;
    transform-origin: center;
    margin: -25px 0 0 -25px;
  }
</style>
</head>
<body class="app-shell page-terminal">

<div class="app-content">

<!-- Top bar -->
<div class="topbar">
  <a href="onboarding.html" class="brand-lockup">
    <img src="assets/icons/morph-logo.svg" alt="Morph" class="brand-lockup__morph" />
    <span class="brand-lockup__product"><em>Swift</em></span>
  </a>
  <div class="merchant-pill">
    <div class="merchant-avatar">MG</div>
    MG Store
  </div>
</div>

<!-- Currency toggle -->
<div class="currency-row">
  <button class="currency-tab active" onclick="setCurrency('PHP',this)">PHP ₱</button>
  <button class="currency-tab" onclick="setCurrency('USD',this)">USD $</button>
  <button class="currency-tab" onclick="setCurrency('NGN',this)">NGN ₦</button>
  <div class="rate-badge">
    <div class="rate-dot"></div>
    <span id="rate-label">1 USDC = ₱56.12</span>
  </div>
</div>

<!-- Amount display -->
<div class="amount-area">
  <div class="amount-label">Enter amount</div>
  <div class="amount-display">
    <div class="amount-currency" id="sym">₱</div>
    <div class="amount-value" id="display">0</div>
    <div class="cursor-blink"></div>
  </div>
</div>

<!-- Live conversion -->
<div class="conversion-card">
  <div class="conversion-top">
    <span class="conversion-label">Equivalent in stablecoins</span>
    <span class="conversion-refresh">Live feed ↻</span>
  </div>
  <div class="stablecoin-row">
    <div class="stablecoin-chip">
      <div class="sc-token">USDC</div>
      <div class="sc-amount" id="usdc-amount">0.00</div>
      <div class="sc-network">Morph</div>
    </div>
    <div class="stablecoin-chip">
      <div class="sc-token">USDT</div>
      <div class="sc-amount" id="usdt-amount">0.00</div>
      <div class="sc-network">Morph</div>
    </div>
    <div class="stablecoin-chip">
      <div class="sc-token">BGB</div>
      <div class="sc-amount" id="usdt-tron">0.00</div>
      <div class="sc-network">Morph</div>
    </div>
  </div>
</div>

<!-- Keypad -->
<div class="keypad" id="keypad">
  <div class="key" data-val="1" onclick="keyPress('1', event)">
    <div class="key-num">1</div>
  </div>
  <div class="key" data-val="2" onclick="keyPress('2', event)">
    <div class="key-num">2</div>
    <div class="key-sub">ABC</div>
  </div>
  <div class="key" data-val="3" onclick="keyPress('3', event)">
    <div class="key-num">3</div>
    <div class="key-sub">DEF</div>
  </div>
  <div class="key" data-val="4" onclick="keyPress('4', event)">
    <div class="key-num">4</div>
    <div class="key-sub">GHI</div>
  </div>
  <div class="key" data-val="5" onclick="keyPress('5', event)">
    <div class="key-num">5</div>
    <div class="key-sub">JKL</div>
  </div>
  <div class="key" data-val="6" onclick="keyPress('6', event)">
    <div class="key-num">6</div>
    <div class="key-sub">MNO</div>
  </div>
  <div class="key" data-val="7" onclick="keyPress('7', event)">
    <div class="key-num">7</div>
    <div class="key-sub">PQRS</div>
  </div>
  <div class="key" data-val="8" onclick="keyPress('8', event)">
    <div class="key-num">8</div>
    <div class="key-sub">TUV</div>
  </div>
  <div class="key" data-val="9" onclick="keyPress('9', event)">
    <div class="key-num">9</div>
    <div class="key-sub">WXYZ</div>
  </div>
  <div class="key key-action" onclick="keyPress('.', event)">
    <div class="key-num key-decimal">.</div>
  </div>
  <div class="key" data-val="0" onclick="keyPress('0', event)">
    <div class="key-num">0</div>
  </div>
  <div class="key key-action" onclick="keyPress('del', event)">
    <div class="key-backspace">⌫</div>
  </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <a class="nav-btn active" href="terminal.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.25"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.25"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.25"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.25"/></svg>
    Keypad
  </a>
  <a class="nav-btn" href="ledger.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
    Ledger
  </a>
  <button class="nav-btn" onclick="chargeNow()" style="margin-left: auto; background: var(--amber); border-color: var(--amber); color: var(--morph-on-primary, #0E0E11); padding: 8px 20px; font-size: 13px;">
    Charge →
  </button>
</div>

</div>

<footer class="powered-by">
  <a href="https://morph.network" target="_blank" rel="noopener noreferrer" title="Morph Network">
    <img src="assets/icons/morph-icon.svg" alt="" width="14" height="14" />
    <span>Powered by <strong>Morph Network</strong></span>
  </a>
</footer>

<script type="module">
  import { initTerminalPage } from './assets/js/pages/terminalPage.js';

  initTerminalPage();
</script>
</body>
</html>
