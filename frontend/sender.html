<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MorphSwift — Payment Sent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/responsive.css" />
<link rel="stylesheet" href="assets/css/morph-brand.css" />
<link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0E0E11;
    --surface: #141418;
    --surface-2: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --amber: #1BE500;
    --amber-dim: rgba(27, 229, 0, 0.12);
    --text: #f0ede8;
    --muted: #5c5b70;
    --green: #1BE500;
    --green-dim: rgba(27, 229, 0, 0.12);
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sender-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    text-align: center;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .check-circle {
    width: clamp(72px, 18vmin, 96px);
    height: clamp(72px, 18vmin, 96px);
    border-radius: 50%;
    background: var(--green-dim);
    border: 2px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: clamp(16px, 4vmin, 28px);
    animation: popIn 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.3) both;
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .check-svg path {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: drawCheck 0.5s 0.3s ease forwards;
  }

  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  .sender-title {
    font-family: var(--display);
    font-size: clamp(26px, 7vw, 36px);
    font-weight: 800;
    letter-spacing: -0.8px;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .sender-title span { color: var(--green); }

  .sender-sub {
    font-size: clamp(13px, 3.5vw, 15px);
    color: var(--muted);
    line-height: 1.6;
    max-width: 320px;
    margin-bottom: clamp(20px, 5vmin, 32px);
  }

  .sender-sub strong {
    color: var(--text);
    font-weight: 500;
  }

  .receipt-card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 20px;
    text-align: left;
  }

  .receipt-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 9px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  .receipt-row:last-child { border-bottom: none; }

  .receipt-key { color: var(--muted); flex-shrink: 0; }

  .receipt-val {
    font-weight: 500;
    text-align: right;
    word-break: break-all;
  }

  .receipt-val.green { color: var(--green); }

  .receipt-val.mono { font-size: 11px; }

  .status-banner {
    width: 100%;
    max-width: 360px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--amber-dim);
    border: 1px solid rgba(27, 229, 0, 0.25);
    border-radius: 10px;
    font-size: 12px;
    color: var(--green);
    margin-bottom: 20px;
    text-align: left;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .actions {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn-primary {
    width: 100%;
    background: var(--amber);
    border: none;
    border-radius: 12px;
    padding: 15px;
    color: #0E0E11;
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.99); }

  .btn-ghost {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }
</style>
</head>
<body class="app-shell page-sender">

<div class="app-content">
  <div class="topbar">
    <span class="topbar-label">Wallet · Payment receipt</span>
  </div>

  <main class="sender-main">
    <div class="check-circle">
      <svg class="check-svg" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <path d="M10 21L17 28L30 13" stroke="#1BE500" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="sender-title">Payment <span>Sent</span></h1>
    <p class="sender-sub" id="sender-sub">
      Your transfer was broadcast to <strong>Morph Network</strong> and is being confirmed.
    </p>

    <div class="status-banner">
      <span class="status-dot"></span>
      <span id="status-banner-text">Confirmed on Morph · settlement complete</span>
    </div>

    <div class="receipt-card">
      <div class="receipt-row">
        <span class="receipt-key">You sent</span>
        <span class="receipt-val green" id="r-amount">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-key">To</span>
        <span class="receipt-val" id="r-merchant">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-key">Fiat equivalent</span>
        <span class="receipt-val" id="r-fiat">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-key">Network</span>
        <span class="receipt-val">Morph</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-key">Token</span>
        <span class="receipt-val" id="r-token">USDC</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-key">Tx hash</span>
        <span class="receipt-val mono" id="r-tx">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-key">Time</span>
        <span class="receipt-val" id="r-time">—</span>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn-primary" onclick="copyReceipt()">Copy receipt</button>
      <button type="button" class="btn-ghost" onclick="closeReceipt()">Done</button>
    </div>
  </main>
</div>

<footer class="powered-by">
  <a href="https://morph.network" target="_blank" rel="noopener noreferrer" title="Morph Network">
    <img src="assets/icons/morph-icon.svg" alt="" width="14" height="14" />
    <span>Powered by <strong>Morph Network</strong></span>
  </a>
</footer>

<script>
  const syms = { PHP: '₱', USD: '$', NGN: '₦', SGD: 'S$', MYR: 'RM' };

  function loadReceipt() {
    const params = new URLSearchParams(window.location.search);
    let data = null;

    try {
      const stored = sessionStorage.getItem('morphswift-payer-receipt');
      if (stored) data = JSON.parse(stored);
    } catch { /* ignore */ }

    const merged = {
      amount: params.get('amount') ?? data?.amount ?? data?.usdAmount ?? '0.00',
      token: params.get('token') ?? data?.token ?? 'USDC',
      merchant: params.get('merchant') ?? data?.merchant ?? data?.merchantName ?? 'Merchant',
      fiatAmount: params.get('fiatAmount') ?? data?.fiatAmount,
      fiatCurrency: params.get('fiatCurrency') ?? data?.fiatCurrency ?? 'PHP',
      txHash: params.get('tx') ?? params.get('txHash') ?? data?.txHash ?? '',
      timestamp: params.get('timestamp') ?? data?.timestamp ?? new Date().toISOString(),
      network: 'Morph',
      status: params.get('status') ?? data?.status ?? 'sent',
    };

    const sym = syms[merged.fiatCurrency] || merged.fiatCurrency + ' ';
    const fiatLine = merged.fiatAmount
      ? `${sym}${Number(merged.fiatAmount).toLocaleString()} ${merged.fiatCurrency}`
      : '—';

    document.getElementById('r-amount').textContent = `${merged.amount} ${merged.token}`;
    document.getElementById('r-merchant').textContent = decodeURIComponent(String(merged.merchant).replace(/\+/g, ' '));
    document.getElementById('r-fiat').textContent = fiatLine;
    document.getElementById('r-token').textContent = merged.token;
    document.getElementById('r-tx').textContent = merged.txHash || 'Pending…';
    document.getElementById('r-time').textContent = new Date(merged.timestamp).toLocaleString();

    document.getElementById('sender-sub').innerHTML =
      `You paid <strong>${merged.amount} ${merged.token}</strong> to <strong>${document.getElementById('r-merchant').textContent}</strong> on Morph Network.`;

    if (merged.status === 'pending') {
      document.getElementById('status-banner-text').textContent = 'Submitted · awaiting block confirmation on Morph';
    }

    return merged;
  }

  let receiptData = loadReceipt();

  function copyReceipt() {
    const text = [
      'MorphSwift Payment Receipt',
      `Sent: ${receiptData.amount} ${receiptData.token}`,
      `To: ${document.getElementById('r-merchant').textContent}`,
      `Network: Morph`,
      `Tx: ${receiptData.txHash || '—'}`,
      `Time: ${document.getElementById('r-time').textContent}`,
    ].join('\n');
    navigator.clipboard.writeText(text).catch(() => {});
    const btn = document.querySelector('.btn-primary');
    const prev = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = prev; }, 2000);
  }

  function closeReceipt() {
    if (window.history.length > 1) {
      window.history.back();
    } else {
      window.close();
    }
  }
</script>
</body>
</html>
