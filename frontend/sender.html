<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MorphSwift — Payment Sent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/responsive.css" />
<link rel="stylesheet" href="assets/css/morph-brand.css" />
<link rel="stylesheet" href="assets/css/fit-screen.css" />
<link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0E0E11;
    --surface: #141418;
    --surface-2: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --amber: #1BE500;
    --amber-dim: rgba(27, 229, 0, 0.12);
    --text: #f0ede8;
    --muted: #5c5b70;
    --green: #1BE500;
    --green-dim: rgba(27, 229, 0, 0.12);
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  .check-svg path {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: drawCheck 0.5s 0.3s ease forwards;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 2s ease infinite;
  }

  .receipt-val.green { color: var(--green); }
</style>
</head>
<body class="app-shell page-sender">

<div class="app-content">
  <div class="topbar">
    <span class="topbar-label">Wallet · Payment receipt</span>
  </div>

  <main class="sender-main">
    <div class="sender-hero">
      <div class="check-circle">
        <svg class="check-svg" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <path d="M10 21L17 28L30 13" stroke="#1BE500" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="sender-title">Payment <span>Sent</span></h1>
      <p class="sender-sub" id="sender-sub">
        Your transfer was broadcast to <strong>Morph Network</strong>.
      </p>
    </div>

    <div class="sender-stack">
      <div class="status-banner">
        <span class="status-dot"></span>
        <span id="status-banner-text">Confirmed on Morph · settlement complete</span>
      </div>

      <label class="narration-block" for="narration">
        <span class="narration-label">Payment narration</span>
        <textarea
          id="narration"
          class="narration-input"
          rows="2"
          maxlength="140"
          placeholder="e.g. Invoice #1042, March supplies…"
        ></textarea>
        <span class="narration-hint">Visible to the merchant on Morph (optional, max 140 chars)</span>
      </label>

      <div class="receipt-card">
        <div class="receipt-scroll">
          <div class="receipt-row">
            <span class="receipt-key">You sent</span>
            <span class="receipt-val green" id="r-amount">—</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-key">To</span>
            <span class="receipt-val" id="r-merchant">—</span>
          </div>
          <div class="receipt-row" id="r-narration-row" style="display:none">
            <span class="receipt-key">Note</span>
            <span class="receipt-val" id="r-narration">—</span>
          </div>
          <div class="receipt-row" id="r-fiat-row">
            <span class="receipt-key">Fiat equivalent</span>
            <span class="receipt-val" id="r-fiat">—</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-key">Network</span>
            <span class="receipt-val">Morph</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-key">Token</span>
            <span class="receipt-val" id="r-token">USDC</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-key">Tx hash</span>
            <span class="receipt-val mono" id="r-tx">—</span>
          </div>
          <div class="receipt-row" id="r-time-row">
            <span class="receipt-key">Time</span>
            <span class="receipt-val" id="r-time">—</span>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn-primary" onclick="saveAndCopy()">Save &amp; copy receipt</button>
      <button type="button" class="btn-ghost" onclick="closeReceipt()">Done</button>
    </div>
  </main>
</div>

<footer class="powered-by">
  <a href="https://morph.network" target="_blank" rel="noopener noreferrer" title="Morph Network">
    <img src="assets/icons/morph-icon.svg" alt="" width="14" height="14" />
    <span>Powered by <strong>Morph Network</strong></span>
  </a>
</footer>

<script>
  const syms = { PHP: '₱', USD: '$', NGN: '₦', SGD: 'S$', MYR: 'RM' };
  const narrationEl = document.getElementById('narration');

  function loadReceipt() {
    const params = new URLSearchParams(window.location.search);
    let data = null;

    try {
      const stored = sessionStorage.getItem('morphswift-payer-receipt');
      if (stored) data = JSON.parse(stored);
    } catch { /* ignore */ }

    const merged = {
      amount: params.get('amount') ?? data?.amount ?? data?.usdAmount ?? '0.00',
      token: params.get('token') ?? data?.token ?? 'USDC',
      merchant: params.get('merchant') ?? data?.merchant ?? data?.merchantName ?? 'Merchant',
      fiatAmount: params.get('fiatAmount') ?? data?.fiatAmount,
      fiatCurrency: params.get('fiatCurrency') ?? data?.fiatCurrency ?? 'PHP',
      txHash: params.get('tx') ?? params.get('txHash') ?? data?.txHash ?? '',
      timestamp: params.get('timestamp') ?? data?.timestamp ?? new Date().toISOString(),
      narration: params.get('narration') ?? data?.narration ?? '',
      network: 'Morph',
      status: params.get('status') ?? data?.status ?? 'sent',
    };

    const sym = syms[merged.fiatCurrency] || merged.fiatCurrency + ' ';
    const fiatLine = merged.fiatAmount
      ? `${sym}${Number(merged.fiatAmount).toLocaleString()} ${merged.fiatCurrency}`
      : '—';

    document.getElementById('r-amount').textContent = `${merged.amount} ${merged.token}`;
    document.getElementById('r-merchant').textContent = decodeURIComponent(String(merged.merchant).replace(/\+/g, ' '));
    document.getElementById('r-fiat').textContent = fiatLine;
    document.getElementById('r-token').textContent = merged.token;
    document.getElementById('r-tx').textContent = merged.txHash || 'Pending…';
    document.getElementById('r-time').textContent = new Date(merged.timestamp).toLocaleString();
    narrationEl.value = merged.narration || '';
    updateNarrationDisplay();

    document.getElementById('sender-sub').innerHTML =
      `You paid <strong>${merged.amount} ${merged.token}</strong> to <strong>${document.getElementById('r-merchant').textContent}</strong> on Morph.`;

    if (merged.status === 'pending') {
      document.getElementById('status-banner-text').textContent = 'Submitted · awaiting block confirmation on Morph';
    }

    return merged;
  }

  let receiptData = loadReceipt();

  function persistReceipt() {
    const narration = narrationEl.value.trim();
    receiptData.narration = narration;
    try {
      const stored = JSON.parse(sessionStorage.getItem('morphswift-payer-receipt') || '{}');
      sessionStorage.setItem('morphswift-payer-receipt', JSON.stringify({
        ...stored,
        ...receiptData,
        narration,
      }));
    } catch {
      sessionStorage.setItem('morphswift-payer-receipt', JSON.stringify({ ...receiptData, narration }));
    }
    updateNarrationDisplay();
  }

  function updateNarrationDisplay() {
    const note = narrationEl.value.trim();
    const row = document.getElementById('r-narration-row');
    const val = document.getElementById('r-narration');
    if (note) {
      row.style.display = '';
      val.textContent = note;
    } else {
      row.style.display = 'none';
    }
  }

  narrationEl.addEventListener('input', () => {
    updateNarrationDisplay();
  });

  function buildReceiptText() {
    const lines = [
      'MorphSwift Payment Receipt',
      `Sent: ${receiptData.amount} ${receiptData.token}`,
      `To: ${document.getElementById('r-merchant').textContent}`,
      `Network: Morph`,
    ];
    const note = narrationEl.value.trim();
    if (note) lines.push(`Narration: ${note}`);
    lines.push(`Tx: ${receiptData.txHash || '—'}`);
    lines.push(`Time: ${document.getElementById('r-time').textContent}`);
    return lines.join('\n');
  }

  function saveAndCopy() {
    persistReceipt();
    navigator.clipboard.writeText(buildReceiptText()).catch(() => {});
    const btn = document.querySelector('.btn-primary');
    const prev = btn.textContent;
    btn.textContent = 'Saved & copied!';
    setTimeout(() => { btn.textContent = prev; }, 2000);
  }

  function closeReceipt() {
    persistReceipt();
    if (window.history.length > 1) {
      window.history.back();
    } else {
      window.close();
    }
  }
</script>
</body>
</html>
